name: Release

# Fires when a draft (from Release Drafter) is published: builds the app at
# the release tag, packages SpaceMatters-<version>.dmg (first install) and
# SpaceMatters-<version>.zip (Sparkle update), refreshes the cumulative
# appcast.xml, and attaches everything to the release (SPEC-07 + SPEC-12).
#
# Signing is tiered (SPEC-12 §3.7):
#   - MACOS_CERT_P12 may hold a *self-signed* "SpaceMatters" cert (piste A:
#     stable identity → FDA persists across updates; Gatekeeper still warns
#     on first install) or a "Developer ID Application" cert (piste B).
#   - Hardened runtime + timestamp are applied by bundle.sh only for
#     Developer ID (no Team ID → library validation would kill the app).
#   - Notarization/stapling only run with the APPLE_* secrets (piste B).
#   - With no cert at all, the build falls back to ad-hoc and the step
#     summary says so.
#
# Repository secrets:
#   SPARKLE_ED_PRIVATE_KEY        EdDSA seed signing Sparkle updates (required
#                                 for the appcast; independent of Apple)
#   MACOS_CERT_P12                base64 of the signing cert .p12 (see above)
#   MACOS_CERT_PASSWORD           password protecting the .p12
#   APPLE_ID                      Apple ID that owns the certificate
#   APPLE_TEAM_ID                 10-char team identifier
#   APPLE_APP_SPECIFIC_PASSWORD   app-specific password for notarytool

on:
  release:
    types: [published]

# Least privilege by default; the job elevates only what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  dmg:
    name: Build & attach DMG
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write # upload the DMG to the release
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
      HAS_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' }}
      HAS_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # CFBundleVersion = commit count (bundle.sh)

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)/Contents/Developer"

      - name: Import Developer ID certificate
        if: env.HAS_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 1800 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          # No -v: a self-signed cert (piste A) shows as CSSMERR_TP_NOT_TRUSTED
          # and the -v filter would hide it, although codesign signs fine with
          # it (SPEC-12 §3.7). bundle.sh keys hardened runtime off the name.
          IDENTITY="$(security find-identity -p codesigning "$KEYCHAIN" \
            | sed -n 's/.*[0-9A-F]\{40\} "\(.*\)".*/\1/p' | head -n 1)"
          [ -n "$IDENTITY" ] || { echo "error: no code signing identity in the imported .p12" >&2; exit 1; }
          echo "CODESIGN_ID=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: VERSION="${TAG_NAME#v}" ./Packaging/bundle.sh release

      # bundle.sh signs everything inner→outer (Sparkle helpers, framework,
      # app) with $CODESIGN_ID; this step only re-checks the result.
      - name: Verify signature
        if: env.HAS_SIGNING == 'true'
        run: codesign --verify --strict --verbose=2 SpaceMatters.app

      - name: Build update archive (Sparkle)
        run: |
          echo "ZIP=SpaceMatters-${TAG_NAME#v}.zip" >> "$GITHUB_ENV"
          ditto -c -k --sequesterRsrc --keepParent SpaceMatters.app "SpaceMatters-${TAG_NAME#v}.zip"

      # Piste B only: notarize the app (via the zip), staple it, re-zip, so
      # both the update archive and the DMG below carry the stapled app.
      - name: Notarize & staple app
        if: env.HAS_SIGNING == 'true' && env.HAS_NOTARY == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "$ZIP" --wait \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun stapler staple SpaceMatters.app
          rm "$ZIP"
          ditto -c -k --sequesterRsrc --keepParent SpaceMatters.app "$ZIP"

      - name: Build DMG
        run: |
          echo "DMG=SpaceMatters-${TAG_NAME#v}.dmg" >> "$GITHUB_ENV"
          ./Packaging/make-dmg.sh SpaceMatters.app "SpaceMatters-${TAG_NAME#v}.dmg"

      - name: Sign, notarize & staple DMG
        if: env.HAS_SIGNING == 'true' && env.HAS_NOTARY == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          codesign --force --sign "$CODESIGN_ID" "$DMG"
          xcrun notarytool submit "$DMG" --wait \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD"
          xcrun stapler staple "$DMG"
          spctl -a -vv -t open --context context:primary-signature "$DMG"

      - name: Checksums
        run: |
          shasum -a 256 "$DMG" | tee "$DMG.sha256"
          shasum -a 256 "$ZIP" | tee "$ZIP.sha256"

      # Cumulative Sparkle feed: extends the previous release's appcast.xml,
      # embeds the release body as markdown notes, signs with the EdDSA key.
      - name: Generate appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: ./Packaging/make-appcast.sh "${TAG_NAME#v}" "$ZIP"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" \
            "$DMG" "$DMG.sha256" "$ZIP" "$ZIP.sha256" appcast.xml --clobber

      - name: Summary
        run: |
          {
            echo "## $DMG + $ZIP"
            if [ "$HAS_SIGNING" = "true" ] && [ "$HAS_NOTARY" = "true" ]; then
              echo "✅ Signed with \`$CODESIGN_ID\`, notarized and stapled (piste B)."
            elif [ "$HAS_SIGNING" = "true" ]; then
              echo "⚠️ Signed with \`$CODESIGN_ID\`, **not notarized** — stable identity, FDA persists across updates; Gatekeeper warns on first install (piste A)."
            else
              echo "⚠️ **Ad-hoc signature** (no signing secrets configured): Gatekeeper warns AND Full Disk Access is re-asked after each update."
            fi
            echo
            echo "Sparkle appcast refreshed: \`releases/latest/download/appcast.xml\`."
            echo
            cat "$DMG.sha256" "$ZIP.sha256"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove temporary keychain
        if: always() && env.HAS_SIGNING == 'true'
        run: |
          if [ -f "$RUNNER_TEMP/release.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/release.keychain-db"
          fi
